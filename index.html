<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script>
        const CONFIG = {
            // --- CONFIGURACIÓN DE COMPARTIR (WHATSAPP) ---
            tituloCompartir: "🏹 ¡Estás invitado a la aventura de Sofía Fernanda!",
            descripCompartir: "Acompáñanos a celebrar mis 7 años al estilo de Valiente.",
            imagenCompartir: "https://www.dropbox.com/scl/fi/oabc0fh4j99hlwdyjfylx/SofiaFernada.jpg?rlkey=u08hlrx9t1lza6j8ycrbsbtv3&raw=1",
            linkDeLaPagina: "https://tu-usuario.github.io/nombre-del-repo/",

            // --- TEXTOS ---
            nombreFestejada: "Sofía Fernanda",
            cumpleNumero: "Mis 7 Años",
            fechaTexto: "DOMINGO 12 DE ABRIL",
            lugarNombre: "¡Te esperamos!",
            horaEvento: "5:00 PM",
            mapaURL: "https://www.google.com/maps/place/C.+24+de+Febrero,+Las+Torres,+54942+Buenavista,+M%C3%A9x./@19.6065162,-99.1579239,17z/data=!3m1!4b1!4m6!3m5!1s0x85d1f66572c324ef:0x24570cd75c7902b3!8m2!3d19.6065112!4d-99.155349!16s%2Fg%2F1txc7cl5?entry=ttu&g_ep=EgoyMDI2MDMyNC4wIKXMDSoASAFQAw%3D%3D",
            
            // --- MULTIMEDIA ---
            fotoPortada: "https://www.dropbox.com/scl/fi/oabc0fh4j99hlwdyjfylx/SofiaFernada.jpg?rlkey=u08hlrx9t1lza6j8ycrbsbtv3&raw=1",
            videoURL: "https://www.dropbox.com/scl/fi/nmcp34zzwwz88tdlxpu16/SofiaFernadaVideo.mp4?rlkey=qy8vd1xigsrmz4jc3tov1eowj&raw=1",
            fotoFinal: "https://www.dropbox.com/scl/fi/jjf891oct921650faa2en/SofiaFernanda2.jpg?rlkey=emrp3gxryxymolfu5aefgth3i&raw=1",

            // --- WHATSAPP ---
            numeroWhatsApp: "521234567890", // Incluye código de país sin el +
            mensajeWA: "¡Hola! Confirmo mi asistencia al cumple de Sofía Fernanda",

            // --- CONTADOR ---
            fechaContador: "April 12, 2026 17:00:00", // Formato: Mes Día, Año Hora

            // --- COLORES ---
            colorVerde: "#0b4d36",
            colorOro: "#d4af37"
        };
    </script>

    <title>👑 Invitación Real | Sofía Fernanda</title>
    <meta property="og:title" content="🏹 ¡Estás invitado a la aventura de Sofía Fernanda!">
    <meta property="og:description" content="Acompáñanos a celebrar mis 7 años al estilo de Valiente.">
    <meta property="og:image" content="https://www.dropbox.com/scl/fi/oabc0fh4j99hlwdyjfylx/SofiaFernada.jpg?rlkey=u08hlrx9t1lza6j8ycrbsbtv3&raw=1">
    <meta property="og:url" content="https://tu-usuario.github.io/nombre-del-repo/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --verde: #0b4d36;
            --oro: #d4af37;
            --crema: #fdfcf9;
            --blanco: #ffffff;
        }
        body { margin: 0; padding: 0; background-color: #f0f4f1; font-family: 'Montserrat', sans-serif; text-align: center; user-select: none; }
        .wrapper { max-width: 480px; margin: 0 auto; background-color: var(--blanco); position: relative; border: 8px double var(--verde); box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .header { padding: 40px 20px; background-color: var(--crema); }
        .img-main { width: 100%; height: auto; border: 3px solid var(--oro); pointer-events: none; }
        h1.nombre { font-family: 'Great Vibes', cursive; font-size: 4.5rem; color: var(--verde); margin: 15px 0 0; }
        .cumple-n { font-family: 'Playfair Display', serif; font-size: 1.4rem; letter-spacing: 5px; color: var(--oro); font-weight: bold; text-transform: uppercase; margin-bottom: 20px; }
        section { padding: 45px 25px; border-bottom: 1px solid #eee; }
        .video-container { width: 100%; border-top: 3px solid var(--oro); border-bottom: 3px solid var(--oro); background: #000; line-height: 0; }
        video { width: 100%; outline: none; }
        .info-card { background: var(--crema); padding: 30px; border: 1px solid var(--verde); }
        .btn-gps { display: inline-flex; align-items: center; gap: 10px; margin-top: 20px; padding: 15px 30px; background-color: var(--verde); color: white; text-decoration: none; border-radius: 50px; font-weight: bold; font-size: 0.8rem; letter-spacing: 2px; }
        .timer-container { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        .t-block { background: var(--verde); padding: 10px; border-radius: 8px; min-width: 60px; color: white; }
        .t-val { display: block; font-size: 1.8rem; font-weight: bold; color: var(--oro); }
        .t-lab { font-size: 0.6rem; text-transform: uppercase; }
        .btn-rsvp { display: inline-block; width: 85%; padding: 20px 0; background-color: var(--oro); color: white; text-decoration: none; border-radius: 4px; font-weight: bold; letter-spacing: 2px; margin-top: 25px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    </style>
</head>

<body oncontextmenu="return false;">

    <div class="wrapper">
        <div class="header">
            <img id="elFotoPortada" src="" class="img-main">
            <h1 id="elNombre" class="nombre"></h1>
            <p id="elCumpleN" class="cumple-n"></p>
            <p id="elFechaTxt" style="font-weight: bold; letter-spacing: 3px; color: var(--verde);"></p>
        </div>

        <div class="video-container">
            <video id="elVideo" controls controlsList="nodownload" oncontextmenu="return false;">
                <source src="" type="video/mp4">
            </video>
        </div>

        <section>
            <div class="info-card">
                <p style="letter-spacing: 4px; font-size: 0.7rem; font-weight: bold; color: var(--oro);">NUESTRA AVENTURA ES EN:</p>
                <h3 id="elLugar" style="font-family: 'Playfair Display', serif; font-size: 1.8rem; margin: 10px 0;"></h3>
                <p>La cita es a las <strong id="elHora"></strong></p>
                <a id="elMapa" href="" target="_blank" class="btn-gps">📍 VER UBICACIÓN</a>
            </div>
        </section>

        <section style="padding: 0;">
            <img id="elFotoFinal" src="" class="img-main" style="border: none; border-bottom: 3px solid var(--oro);">
        </section>

        <section style="background-color: var(--crema);">
            <p style="font-size: 0.8rem; letter-spacing: 3px; font-weight: bold;">FALTAN:</p>
            <div class="timer-container">
                <div class="t-block"><span class="t-val" id="d">00</span><span class="t-lab">Días</span></div>
                <div class="t-block"><span class="t-val" id="h">00</span><span class="t-lab">Hrs</span></div>
                <div class="t-block"><span class="t-val" id="m">00</span><span class="t-lab">Min</span></div>
                <div class="t-block"><span class="t-val" id="s">00</span><span class="t-lab">Seg</span></div>
            </div>
        </section>

        <section style="padding-bottom: 80px;">
            <h2 class="titulo-seccion" style="font-family: 'Great Vibes'; font-size: 3.5rem; color: var(--verde);">¡Cambia tu destino!</h2>
            <p>Confirma tu asistencia por WhatsApp</p>
            <a id="elRSVP" href="" class="btn-rsvp">CONFIRMAR ASISTENCIA</a>
        </section>
    </div>

    <script>
        // --- INYECCIÓN DE DATOS DESDE EL PANEL DE CONTROL ---
        document.getElementById('elFotoPortada').src = CONFIG.fotoPortada;
        document.getElementById('elNombre').innerText = CONFIG.nombreFestejada;
        document.getElementById('elCumpleN').innerText = CONFIG.cumpleNumero;
        document.getElementById('elFechaTxt').innerText = CONFIG.fechaTexto;
        document.getElementById('elVideo').querySelector('source').src = CONFIG.videoURL;
        document.getElementById('elVideo').load();
        document.getElementById('elLugar').innerText = CONFIG.lugarNombre;
        document.getElementById('elHora').innerText = CONFIG.horaEvento;
        document.getElementById('elMapa').href = CONFIG.mapaURL;
        document.getElementById('elFotoFinal').src = CONFIG.fotoFinal;
        document.getElementById('elRSVP').href = `https://wa.me/${CONFIG.numeroWhatsApp}?text=${encodeURIComponent(CONFIG.mensajeWA)}`;

        // --- LÓGICA DEL CONTADOR ---
        function timer() {
            const dest = new Date(CONFIG.fechaContador).getTime();
            const now = new Date().getTime();
            const diff = dest - now;
            if (diff > 0) {
                document.getElementById('d').innerText = String(Math.floor(diff / (1000*60*60*24))).padStart(2, '0');
                document.getElementById('h').innerText = String(Math.floor((diff % (1000*60*60*24)) / (1000*60*60))).padStart(2, '0');
                document.getElementById('m').innerText = String(Math.floor((diff % (1000*60*60)) / (1000*60))).padStart(2, '0');
                document.getElementById('s').innerText = String(Math.floor((diff % (1000*60)) / 1000)).padStart(2, '0');
            }
        }
        timer(); setInterval(timer, 1000);

        // --- SEGURIDAD ANTI-DESCARGA ---
        document.onkeydown = function(e) {
            if(e.ctrlKey && (e.keyCode === 85 || e.keyCode === 83)) return false;
        };
    </script>
</body>
</html>
