<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script>
        const CONFIG = {
            // --- CONFIGURACIÓN DE COMPARTIR (WHATSAPP) ---
            tituloCompartir: "🏹 ¡Acompáñanos a la Gran Aventura de Sofía Fernanda!",
            descripCompartir: "Mis 7 Años al estilo de Valiente. ¡No faltes!",
            imagenCompartir: "https://www.dropbox.com/scl/fi/bif1qrd06j724dvfrazch/SofiaFernandaportada.jpg?rlkey=qnj2apwyhtv69pv984ewp04uo&raw=1",

            // --- TEXTOS ---
            nombreFestejada: "Sofía Fernanda",
            cumpleNumero: "Mis 7 Años",
            fechaTexto: "DOMINGO 12 DE ABRIL",
            mensajeBienvenida: "Había una vez una pequeña princesa que soñaba con un baile mágico rodeada de sus mejores amigos... ¡Ese día ha llegado!",
            lugarNombre: "¡Te esperamos!",
            horaEvento: "5:00 PM",
            mapaURL: "https://www.google.com/maps/place/C.+24+de+Febrero,+Las+Torres,+54942+Buenavista,+M%C3%A9x./@19.6065162,-99.1579239,17z/data=!3m1!4b1!4m6!3m5!1s0x85d1f66572c324ef:0x24570cd75c7902b3!8m2!3d19.6065112!4d-99.155349!16s%2Fg%2F1txc7cl5?entry=ttu&g_ep=EgoyMDI2MDMyNC4wIKXMDSoASAFQAw%3D%3D",
            
            // --- MULTIMEDIA ---
            fotoPortada: "https://www.dropbox.com/scl/fi/bif1qrd06j724dvfrazch/SofiaFernandaportada.jpg?rlkey=qnj2apwyhtv69pv984ewp04uo&raw=1",
            videoURL: "https://www.dropbox.com/scl/fi/nmcp34zzwwz88tdlxpu16/SofiaFernadaVideo.mp4?rlkey=qy8vd1xigsrmz4jc3tov1eowj&raw=1",
            fotoFinal: "https://www.dropbox.com/scl/fi/wfzmx8opjysgc39lomk6d/SofiaFernanda.jpg?rlkey=olaxrnzuau0h6xxgefgb2s6jj&raw=1",

            // --- WHATSAPP ---
            numeroWhatsApp: "521234567890",
            mensajeWA: "¡Hola! Confirmo mi asistencia al cumple de Sofía Fernanda",

            // --- CONTADOR ---
            fechaContador: "April 12, 2026 17:00:00",

            // --- COLORES ---
            colorVerde: "#0b4d36",
            colorOro: "#d4af37"
        };
    </script>

    <title>👑 Invitación Valiente | Sofía Fernanda</title>
    <meta property="og:title" content="🏹 ¡Estás invitado a la aventura de Sofía Fernanda!">
    <meta property="og:image" content="https://www.dropbox.com/scl/fi/bif1qrd06j724dvfrazch/SofiaFernandaportada.jpg?rlkey=qnj2apwyhtv69pv984ewp04uo&raw=1">
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { --verde: #0b4d36; --oro: #d4af37; --crema: #fdfcf9; }
        body { margin: 0; padding: 0; background-color: #f0f4f1; font-family: 'Montserrat', sans-serif; text-align: center; user-select: none; }
        .wrapper { max-width: 480px; margin: 0 auto; background-color: #fff; position: relative; border: 8px double var(--verde); box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        
        .header { padding: 40px 20px; background-color: var(--crema); }
        .img-main { width: 100%; height: auto; border: 4px solid var(--oro); border-radius: 4px; }
        
        h1.nombre { font-family: 'Great Vibes', cursive; font-size: 4.5rem; color: var(--verde); margin: 15px 0 0; }
        .cumple-n { font-family: 'Playfair Display', serif; font-size: 1.5rem; letter-spacing: 4px; color: var(--oro); font-weight: bold; text-transform: uppercase; margin: 5px 0 15px; }
        
        .mensaje { padding: 30px 25px; font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.2rem; line-height: 1.6; }

        .video-container { width: 100%; border-top: 3px solid var(--oro); border-bottom: 3px solid var(--oro); background: #000; line-height: 0; position: relative; }
        video { width: 100%; outline: none; }

        .info-card { background: var(--crema); padding: 30px; border: 1px solid var(--verde); margin: 20px; }
        .btn-verde { display: inline-flex; align-items: center; gap: 10px; margin-top: 20px; padding: 15px 30px; background-color: var(--verde); color: white; text-decoration: none; border-radius: 50px; font-weight: bold; font-size: 0.8rem; letter-spacing: 2px; box-shadow: 0 4px 12px rgba(11,77,54,0.3); }

        .timer-container { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .t-block { background: var(--verde); padding: 10px; border-radius: 8px; min-width: 60px; color: white; border: 1px solid var(--oro); }
        .t-val { display: block; font-size: 1.8rem; font-weight: bold; color: var(--oro); }
        .t-lab { font-size: 0.6rem; text-transform: uppercase; }

        .btn-rsvp { display: inline-block; width: 85%; padding: 20px 0; background-color: var(--verde); color: white; text-decoration: none; border-radius: 4px; font-weight: bold; letter-spacing: 2px; margin: 25px 0 60px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        /* Icono de música flotante */
        #music-control { position: fixed; bottom: 20px; right: 20px; background: var(--verde); color: var(--oro); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 1000; border: 2px solid var(--oro); cursor: pointer; }
    </style>
</head>

<body oncontextmenu="return false;">

    <div id="music-control" onclick="toggleMusic()">🔊</div>

    <div class="wrapper">
        <div class="header">
            <img id="elFotoPortada" src="" class="img-main">
            <h1 id="elNombre" class="nombre"></h1>
            <p id="elCumpleN" class="cumple-n"></p>
            <p id="elFechaTxt" style="font-weight: bold; letter-spacing: 3px; color: var(--verde);"></p>
        </div>

        <div class="mensaje">
            <p id="elMensaje"></p>
        </div>

        <div class="video-container">
            <video id="elVideo" loop playsinline oncontextmenu="return false;">
                <source src="" type="video/mp4">
            </video>
        </div>

        <section>
            <div class="info-card">
                <p style="letter-spacing: 4px; font-size: 0.7rem; font-weight: bold; color: var(--oro);">NUESTRA AVENTURA ES EN:</p>
                <h3 id="elLugar" style="font-family: 'Playfair Display', serif; font-size: 1.8rem; margin: 10px 0;"></h3>
                <p>La cita es a las <strong id="elHora"></strong></p>
                <a id="elMapa" href="" target="_blank" class="btn-verde">📍 VER UBICACIÓN</a>
            </div>
        </section>

        <img id="elFotoFinal" src="" class="img-main" style="border: none; border-bottom: 3px solid var(--oro);">

        <section style="background-color: var(--crema); padding: 30px 0;">
            <p style="font-size: 0.8rem; letter-spacing: 3px; font-weight: bold; color: var(--verde);">FALTAN:</p>
            <div class="timer-container">
                <div class="t-block"><span class="t-val" id="d">00</span><span class="t-lab">Días</span></div>
                <div class="t-block"><span class="t-val" id="h">00</span><span class="t-lab">Hrs</span></div>
                <div class="t-block"><span class="t-val" id="m">00</span><span class="t-lab">Min</span></div>
                <div class="t-block"><span class="t-val" id="s">00</span><span class="t-lab">Seg</span></div>
            </div>
        </section>

        <h2 style="font-family: 'Great Vibes'; font-size: 3.5rem; color: var(--verde); margin-top: 40px;">¡Cambia tu destino!</h2>
        <a id="elRSVP" href="" class="btn-rsvp">CONFIRMAR ASISTENCIA</a>
    </div>

    <script>
        const v = document.getElementById('elVideo');
        const mBtn = document.getElementById('music-control');

        // Cargar datos
        document.getElementById('elFotoPortada').src = CONFIG.fotoPortada;
        document.getElementById('elNombre').innerText = CONFIG.nombreFestejada;
        document.getElementById('elCumpleN').innerText = CONFIG.cumpleNumero;
        document.getElementById('elFechaTxt').innerText = CONFIG.fechaTexto;
        document.getElementById('elMensaje').innerText = CONFIG.mensajeBienvenida;
        v.querySelector('source').src = CONFIG.videoURL;
        v.load();
        document.getElementById('elLugar').innerText = CONFIG.lugarNombre;
        document.getElementById('elHora').innerText = CONFIG.horaEvento;
        document.getElementById('elMapa').href = CONFIG.mapaURL;
        document.getElementById('elFotoFinal').src = CONFIG.fotoFinal;
        document.getElementById('elRSVP').href = `https://wa.me/${CONFIG.numeroWhatsApp}?text=${encodeURIComponent(CONFIG.mensajeWA)}`;

        // Reproducción automática al primer toque
        window.addEventListener('click', () => {
            if (v.paused) {
                v.play();
                mBtn.innerText = "🔊";
            }
        }, { once: true });

        function toggleMusic() {
            if (v.paused) {
                v.play();
                mBtn.innerText = "🔊";
            } else {
                v.pause();
                mBtn.innerText = "🔈";
            }
        }

        // Contador
        function timer() {
            const dest = new Date(CONFIG.fechaContador).getTime();
            const now = new Date().getTime();
            const diff = dest - now;
            if (diff > 0) {
                document.getElementById('d').innerText = String(Math.floor(diff / (1000*60*60*24))).padStart(2, '0');
                document.getElementById('h').innerText = String(Math.floor((diff % (1000*60*60*24)) / (1000*60*60))).padStart(2, '0');
                document.getElementById('m').innerText = String(Math.floor((diff % (1000*60*60)) / (1000*60))).padStart(2, '0');
                document.getElementById('s').innerText = String(Math.floor((diff % (1000*60)) / 1000)).padStart(2, '0');
            }
        }
        timer(); setInterval(timer, 1000);
    </script>
</body>
</html>
